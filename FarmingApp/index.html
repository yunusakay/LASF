<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LASF | Core Systems</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <div>
            <h1>LASF Telemetry</h1>
            <span id="conn-status" class="offline">Offline</span>
        </div>
        <div id="ai-rec" class="highlight">Initializing...</div>
    </header>

    <main>
        <div class="kpi-grid">
            <div class="kpi">Temp: <span id="v-temp">--</span>°C</div>
            <div class="kpi">Hum: <span id="v-hum">--</span>%</div>
            <div class="kpi">Water: <span id="v-water">--</span>L</div>
            <div class="kpi">State: <span id="v-state" class="highlight">--</span></div>
        </div>

        <div class="panel">
            <h3>NPK Profile</h3>
            <div class="bar-bg"><div id="bar-n" class="bar-fill" style="background:#4ade80"></div></div>
            <div class="bar-bg"><div id="bar-p" class="bar-fill" style="background:#fbbf24"></div></div>
            <div class="bar-bg"><div id="bar-k" class="bar-fill" style="background:#a78bfa"></div></div>
        </div>

        <div class="panel">
            <canvas id="telemetryChart" height="150"></canvas>
        </div>

        <div class="controls">
            <button onclick="toggleDev('dehumidifier', true)">Force Dehumidifier ON</button>
            <button onclick="toggleDev('dehumidifier', false)">Force Dehumidifier OFF</button>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
